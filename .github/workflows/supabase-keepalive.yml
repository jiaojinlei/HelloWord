name: Supabase Keepalive

on:
  schedule:
    # UTC 时间 02:17（北京时间 10:17），每天一次
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL is missing" >&2
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "SUPABASE_ANON_KEY is missing" >&2
            exit 1
          fi

      - name: Ping Supabase auth health endpoint (with retries)
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          endpoint="${SUPABASE_URL%/}/auth/v1/health"
          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "[Attempt ${attempt}/${max_attempts}] GET ${endpoint}"

            status_code=$(curl -sS -o /tmp/keepalive-response.json -w "%{http_code}" \
              --max-time 20 \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${endpoint}")

            echo "HTTP ${status_code}"
            cat /tmp/keepalive-response.json || true
            echo

            if [ "${status_code}" = "200" ]; then
              echo "Keepalive success."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 10))
              echo "Request failed, retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi

            attempt=$((attempt + 1))
          done

          echo "Keepalive failed after ${max_attempts} attempts." >&2
          exit 1
